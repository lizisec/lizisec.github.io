---
layout: default
---
<article class="post note-post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | default: page.url }}</h1>
    <p class="post-meta"><a href="{{ '/notes/' | relative_url }}">← Back to Notes</a></p>
    <p class="note-meta-line">
      <span class="note-badge">{{ page.platform | default: "Unknown" }}</span>
      <span class="note-badge">{{ page.os | default: "Unknown" }}</span>
      <span class="note-badge">{{ page.difficulty | default: "Unknown" }}</span>
      <span class="note-badge">{{ page.track | default: "Standalone" }}</span>
    </p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
