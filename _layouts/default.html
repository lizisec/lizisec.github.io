<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% assign asset_build = site.time | date: '%s' %}
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css?v=' | append: asset_build | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/pygments-friendly.css?v=' | append: asset_build | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} RSS" href="{{ '/feed.xml' | relative_url }}">
</head>
{% assign is_note_detail = false %}
{% if page.url contains '/notes/' and page.url != '/notes/' %}
  {% assign is_note_detail = true %}
{% endif %}
<body class="theme-pixelact{% if page.layout == 'post' or page.layout == 'note' or is_note_detail or page.url == '/search/' %} page-article{% endif %}">
  <header class="site-header">
    <div class="wrapper">
      <div class="header-wrap">
        <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <p class="site-tagline">{{ site.description }}</p>
        <nav class="site-nav">
          <a class="page-link-site {% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
          <a class="page-link-site {% if page.url == '/notes/' or page.url contains '/notes/' %}active{% endif %}" href="{{ '/notes/' | relative_url }}">Notes</a>
          <a class="page-link-site {% if page.url == '/search/' %}active{% endif %}" href="{{ '/search/' | relative_url }}">Search</a>
          <a class="page-link-site" href="https://github.com/lizisec/lizisec.github.io" target="_blank" rel="noopener noreferrer">GitHub</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="page-content" aria-label="Content">
    <div class="wrapper content-shell">
      {{ content }}
    </div>
  </main>
  <aside class="pixel-pet-widget" data-pet-widget aria-live="polite">
    <div class="pixel-pet-bubble" data-pet-bubble hidden>
      <p class="pixel-pet-text" data-pet-text></p>
      <button type="button" class="pixel-pet-close" data-pet-close aria-label="Close pet message">x</button>
    </div>
    <button type="button" class="pixel-pet-body" data-pet-body aria-label="Pixel pet">
      <img
        class="pixel-pet-sprite"
        data-pet-sprite
        src="{{ '/assets/pet/pet_idle_01.svg' | relative_url }}"
        data-frame-a="{{ '/assets/pet/pet_idle_01.svg' | relative_url }}"
        data-frame-b="{{ '/assets/pet/pet_idle_02.svg' | relative_url }}"
        alt="Pixel pet"
      >
    </button>
  </aside>
  <script defer src="{{ '/assets/js/main.js?v=' | append: asset_build | relative_url }}"></script>
</body>
</html>
